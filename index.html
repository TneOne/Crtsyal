<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>給晶安</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      font-family: "Noto Sans TC", sans-serif;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: rgba(0,0,0,0.45);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      max-width: 90%;
      animation: fadeIn 1.5s ease;
      border: 1px solid rgba(255,255,255,0.15);
    }

    h1 {
      color: #ffffff;
      font-size: 30px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      color: #eaeaea;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 300;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(255, 120, 150, 0.3);
    }

    .btn:hover {
      transform: scale(1.08);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      color: #ffffff;
      font-weight: 500;
    }

    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #ff4d6d;
      transform: rotate(45deg);
      animation: float 6s infinite;
      opacity: 0.7;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: #ff4d6d;
      border-radius: 50%;
    }

    .heart::before { top: -9px; left: 0; }
    .heart::after { left: -9px; top: 0; }

    @keyframes float {
      0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
      100% { transform: translateY(-900px) rotate(45deg); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>老婆，好久不見！</h1>
  <p>做了這個給妳！</p>
  
  <button class="btn" onclick="reveal()">老公的話</button>
  
  <div id="msg" class="hidden">
    <p style="font-size:22px; margin-top:10px;"><b>我每天都很想妳愛妳 ❤️</b></p>
    <p style="font-size:22px; margin-top:10px;"><b>希望妳也有想我愛我 ❤️</b></p>
  </div>
</div>

<script>
function reveal() {
  document.getElementById('msg').style.display = 'block';
}

function createHearts() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  heart.style.top = window.innerHeight + 'px';
  heart.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHearts, 250);
</script>

</body>
</html>
